apply plugin: 'com.android.application'

// Load signing config from keystore.properties
def keystorePropertiesFile = rootProject.file("app/keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "cafe.mint.enlighten"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "cafe.mint.enlighten"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 8
        versionName "1.0.7"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // V68.56 — AAB asset strip. Excludes ~18 MB of marketing /
            // proof / SEO files that are NOT referenced at runtime by
            // the React app inside the WebView. Each pattern is
            // colon-separated. Keep the leading default-ignore tokens.
            // V68.58 — `qr` removed from strip list (ACTIVELY referenced
            // by QRRefractionDisplay + SovereignQRPortal). Adding it
            // back would 404 the QR features in production builds.
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~:!showcase.mp4:!showcase.webm:!store-assets:!proof:!proof2:!docs:!qr-code.png'
        }
    }
    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            // V68.56 — code + resource shrinking enabled. R8 strips
            // unused Java/Kotlin classes; resource shrinker drops
            // unreferenced drawable / layout XML. Note: most of our
            // app weight is the React bundle in assets/, which R8
            // does NOT touch (it's already minified by webpack).
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (keystoreProperties['storeFile']) {
                signingConfig signingConfigs.release
            }
        }
    }
    bundle {
        // V68.56 — AAB modularization for Play's per-device delivery.
        // Each split lets Play ship only the matching slice to the
        // user's device, shrinking install size further.
        language { enableSplit = true }
        density  { enableSplit = true }
        abi      { enableSplit = true }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
