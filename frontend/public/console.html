<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Contrast 3D Console</title>
    <style>
        :root {
            --surface-top: #2a2a32;
            --surface-front: #1e1e24;
            --surface-inset: #0f0f12;
            --accent-glow: #00f2ff;
            --text-main: #ffffff;
            --transition-spring: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-family: 'Inter', sans-serif;
            perspective: 1500px;
            overflow: hidden;
        }

        /* --- THE CHASSIS (3D Structure) --- */
        .console-bar {
            width: 85%;
            max-width: 700px;
            position: relative;
            transform-style: preserve-3d;
            transition: var(--transition-spring);
            z-index: 10;
        }

        .bar-top { 
            transform: rotateX(25deg) translateY(20px); 
            margin-top: 20px;
        }
        
        .bar-bottom { 
            transform: rotateX(-25deg) translateY(-20px); 
            margin-bottom: 20px;
        }

        .bar-top:hover, .bar-bottom:hover {
            transform: rotateX(0deg) translateZ(40px);
        }

        /* --- TACTILE SKIN --- */
        .bar-face {
            background: var(--surface-front);
            border-radius: 8px;
            padding: 8px;
            /* Multi-layered shadows for "Physical Mass" */
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.9),
                inset 0 1px 0 rgba(255,255,255,0.1), /* Top Rim Highlight */
                inset 0 -4px 10px rgba(0,0,0,0.8);    /* Bottom Rim Depth */
            border: 1px solid #333;
            cursor: pointer;
        }

        /* --- ACCORDION DRAWERS --- */
        .drawer {
            background: var(--surface-inset);
            max-height: 0;
            overflow: hidden;
            transition: var(--transition-spring);
            border-radius: 0 0 6px 6px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,1);
            transform: translateZ(-20px); /* Sits deeper in the screen */
            opacity: 0;
        }

        .drawer.active {
            max-height: 250px;
            padding: 20px;
            margin-top: 5px;
            opacity: 1;
            transform: translateZ(0);
        }

        /* --- INTERACTIVE NODES --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .module-node {
            background: linear-gradient(145deg, #23232a, #1a1a1f);
            border: 1px solid #333;
            color: #aaa;
            padding: 15px 5px;
            text-align: center;
            border-radius: 4px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.5);
        }

        .module-node:hover {
            color: var(--accent-glow);
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transform: translateY(-2px);
        }

        /* --- THE GRAB HANDLE --- */
        .grab-rail {
            width: 60px;
            height: 3px;
            background: #444;
            margin: 4px auto;
            border-radius: 10px;
            box-shadow: inset 0 1px 2px black;
        }

        .label {
            color: #fff;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 3px;
            padding: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <div class="console-bar bar-top">
        <div class="bar-face" onclick="toggleDrawer('topDrawer')">
            <div class="grab-rail"></div>
            <div class="label">PRIMARY SYSTEMS</div>
        </div>
        <div id="topDrawer" class="drawer">
            <div class="grid-layout">
                <div class="module-node">Audio</div>
                <div class="module-node">Visuals</div>
                <div class="module-node">Logic</div>
            </div>
        </div>
    </div>

    <div class="console-bar bar-bottom">
        <div id="bottomDrawer" class="drawer">
            <div class="grid-layout">
                <div class="module-node">User</div>
                <div class="module-node">Network</div>
                <div class="module-node">Data</div>
            </div>
        </div>
        <div class="bar-face" onclick="toggleDrawer('bottomDrawer')">
            <div class="label">ENVIRONMENTAL CONTROLS</div>
            <div class="grab-rail"></div>
        </div>
    </div>

    <script>
        function toggleDrawer(id) {
            const el = document.getElementById(id);
            const isActive = el.classList.contains('active');
            
            // Exclusive expansion logic
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('active'));
            
            if (!isActive) {
                el.classList.add('active');
            }
        }
    </script>
</body>
</html>
