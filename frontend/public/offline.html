<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENLIGHTEN.MINT.CAFE — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      color: #F8FAFC;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: conic-gradient(#EF4444, #F97316, #EAB308, #22C55E, #3B82F6, #6366F1, #8B5CF6, #EF4444);
      margin: 0 auto 2rem;
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #8B5CF6, #3B82F6, #22C55E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 0.875rem;
      color: rgba(248,250,252,0.5);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(139,92,246,0.3);
      background: rgba(139,92,246,0.1);
      color: #C4B5FD;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: rgba(139,92,246,0.2); transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"></div>
    <h1>Signal Lost</h1>
    <p>The Sovereign Engine requires a connection to sync your cosmic data. Reconnect to resume your journey.</p>
    <button onclick="window.location.reload()">Reconnect</button>
  </div>
</body>
</html>
